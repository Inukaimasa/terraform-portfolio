<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール編集</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%);
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      color: #6b7280;
      line-height: 1.7;
    }

    .form-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #111827;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .button {
      display: inline-block;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .button-primary {
      background: #111827;
      color: #ffffff;
    }

    .button-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .button:hover {
      opacity: 0.92;
    }

    .sub-links {
      margin-top: 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .sub-links a {
      color: #374151;
      text-decoration: none;
      font-size: 14px;
    }

    .sub-links a:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.7;
    }

    .success-message {
      margin-top: 16px;
      color: #166534;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>プロフィール編集</h1>
      <p>
        公開プロフィールに表示する基本情報を編集します。
        現在は見た目確認用の仮画面です。
      </p>
    </header>

    <section class="form-card">
      <form id="profileForm">
        <div class="form-group">
          <label for="displayName">表示名</label>
          <input
            type="text"
            id="displayName"
            name="displayName"
            value="犬飼"
            placeholder="表示名を入力"
            required
          />
        </div>

        <div class="form-group">
          <label for="title">肩書き</label>
          <input
            type="text"
            id="title"
            name="title"
            value="インフラ / 監視設計 / IaC 学習中"
            placeholder="肩書きを入力"
            required
          />
        </div>

        <div class="form-group">
          <label for="bio">自己紹介</label>
          <textarea
            id="bio"
            name="bio"
            placeholder="自己紹介を入力"
            required
          >監視設計、運用改善、AWS、Terraform を学びながら、個人クリエイター向けの導線サービスを制作中です。</textarea>
        </div>

        <div class="form-group">
          <label for="profileImageUrl">プロフィール画像URL</label>
          <input
            type="url"
            id="profileImageUrl"
            name="profileImageUrl"
            placeholder="https://example.com/profile.png"
            value="https://via.placeholder.com/112"
          />
        </div>

        <div class="button-row">
          <button type="submit" class="button button-primary">保存する</button>
          <a class="button button-secondary" href="./admin.html">管理トップへ戻る</a>
        </div>

        <p id="successMessage" class="success-message">
          保存しました（仮表示）。
        </p>
      </form>
    </section>

    <div class="sub-links">
      <a href="./profile.html">公開プロフィールを見る</a>
      <a href="./admin-links.html">リンク管理へ</a>
      <a href="./admin-analytics.html">アクセス集計へ</a>
    </div>

    <p class="note">
      ※ Phase1 ではまず画面構成を固め、後続で API Gateway / Lambda / DynamoDB と接続します。
    </p>
  </div>

  <script>
    const profileForm = document.getElementById("profileForm");
    const successMessage = document.getElementById("successMessage");

    profileForm.addEventListener("submit", function (event) {
      event.preventDefault();
      successMessage.style.display = "block";
    });
  </script>
</body>
</html>
