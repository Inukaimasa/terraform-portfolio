<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クリエイタープロフィール</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%);
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .profile-card {
      background: #fff;
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 4px solid #f3f4f6;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .title {
      margin: 0 0 16px;
      font-size: 14px;
      color: #6b7280;
    }

    .bio {
      margin: 0 auto 28px;
      max-width: 520px;
      line-height: 1.8;
      color: #4b5563;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .link-button {
      display: block;
      padding: 14px 16px;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .link-button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .sub-links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .sub-links a {
      color: #374151;
      text-decoration: none;
      font-size: 14px;
    }

    .sub-links a:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 24px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="profile-card">
      <img
        class="avatar"
        src="./img/profile.png"
        alt="プロフィール画像"
      />

      <h1>犬飼 </h1>
      <p class="title">インフラ / 監視設計 / IaC 学習中</p>

      <p class="bio">
        監視設計、運用改善、AWS、Terraform を学びながら、
        個人クリエイター向けの導線サービスを制作中です。
        SNSや販売リンクをわかりやすくまとめて届けます。
      </p>

      <div class="links">
        <a class="link-button" href="/r/inukai/instagram">Instagram</a>
        <a class="link-button" href="/r/inukai/x">X</a>
        <a class="link-button" href="/r/inukai/youtube">YouTube</a>
        <a class="link-button" href="/r/inukai/shop">作品販売ページ</a>
      </div>

      <div class="sub-links">
        <a href="./index.html">トップへ戻る</a>
        <a href="./login.html">ログイン</a>
      </div>

      <p class="note">
        ※ 本番ではリンククリック時に API Gateway + Lambda を経由して、
        アクセス集計を記録してから外部ページへ遷移します。
      </p>
    </section>
  </div>
</body>
</html>
