<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Profile</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f4f7fb 0%, #eaf1fb 100%);
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }

    .profile-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #c7d8ff 0%, #9ebdff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: #1f3d7a;
    }

    .name {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 15px;
      line-height: 1.7;
      color: #555;
      max-width: 560px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 32px 0 16px;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    .link-button {
      display: block;
      width: 100%;
      text-decoration: none;
      text-align: center;
      padding: 15px 16px;
      border-radius: 12px;
      background: #1f6feb;
      color: #fff;
      font-weight: bold;
      transition: transform 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 12px rgba(31, 111, 235, 0.25);
    }

    .link-button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .link-button.secondary {
      background: #4b5563;
      box-shadow: 0 4px 12px rgba(75, 85, 99, 0.2);
    }

    .link-button.disabled {
      background: #9ca3af;
      box-shadow: none;
      pointer-events: none;
      cursor: default;
    }

    .analytics-box {
      margin-top: 16px;
      padding: 20px;
      border-radius: 14px;
      background: #eef4ff;
      border: 1px solid #d7e5ff;
    }

    .analytics-label {
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }

    .analytics-value {
      font-size: 28px;
      font-weight: bold;
      color: #1f3d7a;
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: #777;
    }

    @media (max-width: 640px) {
      .container {
        margin: 20px auto;
        padding: 16px;
      }

      .card {
        padding: 24px 18px;
      }

      .name {
        font-size: 24px;
      }
    }
  </style>
</head>

<script>
  const analyticsApiUrl =
    "https://ko7x8t74kg.execute-api.ap-northeast-1.amazonaws.com/analytics/abc123";

  async function loadAnalytics() {
    const accessCountEl = document.getElementById("accessCount");

    try {
      const response = await fetch(analyticsApiUrl);

      if (!response.ok) {
        accessCountEl.textContent = "取得失敗";
        return;
      }

      const data = await response.json();
      accessCountEl.textContent = data.access_count ?? "--";
    } catch (error) {
      accessCountEl.textContent = "取得失敗";
      console.error("analytics fetch error:", error);
    }
  }

  loadAnalytics();
</script><script>
  const analyticsApiUrl =
    "https://ko7x8t74kg.execute-api.ap-northeast-1.amazonaws.com/analytics/abc123";

  async function loadAnalytics() {
    const accessCountEl = document.getElementById("accessCount");

    try {
      const response = await fetch(analyticsApiUrl);

      if (!response.ok) {
        accessCountEl.textContent = "取得失敗";
        return;
      }

      const data = await response.json();
      accessCountEl.textContent = data.access_count ?? "--";
    } catch (error) {
      accessCountEl.textContent = "取得失敗";
      console.error("analytics fetch error:", error);
    }
  }

  loadAnalytics();
</script>



<body>
  <div class="container">
    <div class="card">
      <div class="profile-header">
        <div class="avatar">I</div>
        <div class="name">Inukai Creator</div>
        <div class="bio">
          個人クリエイター向け導線サービスのフロント試作です。<br />
          API Gateway → Lambda → DynamoDB の動作確認用として、リンク遷移とアクセス計測を行います。
        </div>
      </div>

      <div class="section-title">Links</div>
      <div class="links">
        <!-- ここだけ本接続 -->
        <a
          class="link-button"
          href="https://ko7x8t74kg.execute-api.ap-northeast-1.amazonaws.com/r/abc123"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram（API Gateway接続）
        </a>

        <!-- 以下3つは見た目だけ先に用意 -->
        <a class="link-button secondary disabled" href="#">
          X（準備中）
        </a>

        <a class="link-button secondary disabled" href="#">
          YouTube（準備中）
        </a>

        <a class="link-button secondary disabled" href="#">
          Shop（準備中）
        </a>
      </div>

      <div class="section-title">Analytics</div>
      <div class="analytics-box">
        <div class="analytics-label">アクセス数表示エリア</div>
        <div class="analytics-value" id="accessCount">--</div>
        <div class="note">
          今回は表示枠だけ先に作成。<br />
          次の実装で analytics API と接続して access_count を表示します。
        </div>
      </div>

      <div class="footer">
        Creator Route Service Portfolio / Phase 1
      </div>
    </div>
  </div>
</body>
</html>
