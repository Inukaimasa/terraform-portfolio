<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%);
      color: #222;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .login-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      text-align: center;
    }

    .description {
      margin: 0 0 28px;
      color: #6b7280;
      text-align: center;
      line-height: 1.7;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #111827;
    }

    .login-button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px 16px;
      background: #111827;
      color: #ffffff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 8px;
    }

    .login-button:hover {
      opacity: 0.92;
    }

    .links {
      margin-top: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links a {
      color: #374151;
      text-decoration: none;
      font-size: 14px;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }

    .error-message {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="login-card">
      <h1>ログイン</h1>
      <p class="description">
        クリエイター向け管理画面へ入るためのログイン画面です。<br />
        現在は見た目 + 基本バリデーションのみの仮画面です。
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="sample@example.com"
            required
          />
          <div id="emailError" class="error-message">
            正しいメールアドレスを入力してください。
          </div>
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="8文字以上で入力"
            required
            minlength="8"
          />
          <div id="passwordError" class="error-message">
            パスワードは8文字以上で入力してください。
          </div>
        </div>

        <button type="submit" class="login-button">ログイン</button>
      </form>

      <div class="links">
        <a href="./admin.html">管理トップへ（仮リンク）</a>
        <a href="./index.html">トップへ戻る</a>
      </div>

      <p class="note">
        ※ Phase1 では認証本実装は行わず、後続で認証機能を追加予定です。
      </p>
    </section>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    form.addEventListener("submit", function (event) {
      let hasError = false;

      emailError.style.display = "none";
      passwordError.style.display = "none";

      if (!email.checkValidity()) {
        emailError.style.display = "block";
        hasError = true;
      }

      if (!password.checkValidity()) {
        passwordError.style.display = "block";
        hasError = true;
      }

      if (hasError) {
        event.preventDefault();
        return;
      }

      event.preventDefault();
      window.location.href = "./admin.html";
    });
  </script>
</body>
</html>
