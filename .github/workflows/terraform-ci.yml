# CLの設定
# GitHub Actions の画面に出る名前
name: Terraform-CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/**"
      #追加ecs用 
      - "terraform-ecs/**"  
      - ".github/workflows/terraform-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - "terraform/**"
        #追加ecs用 
      - "terraform-ecs/**"    
      - ".github/workflows/terraform-ci.yml"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      # backend や認証情報が固まってから有効化
      # - name: Terraform Plan
      #   run: terraform plan -no-color
      #追加ecs用 
      # このjobのIDです。GitHub Actions上での識別名。
  terraform-ecs:
  # GitHub ActionsのUI画面に表示される人が読む用の名前です
    name: Terraform-ECS
    # どのOS上で実行するか。GitHubが用意したUbuntu環境
    runs-on: ubuntu-latest

    defaults:
      run:
      #  terraform fmt を実行したとき、リポジトリのルート（/）で実行されてしまいます。terraform-ecs/ フォルダに入った状態でコマンドを動かすための設
        working-directory: terraform-ecs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      # backend や認証情報が固まってから有効化
      # - name: Terraform Plan
      #   run: terraform plan -no-color